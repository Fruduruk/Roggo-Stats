name: RoggoStatsDevEnv

volumes:
  dev_db:
  dev_configdb:
networks:
  roggo_network:
services:
  ballchasing_db:
    image: mongo:8.2.6
    ports:
      - '29017:27017'
    container_name: ballchasing_db
    networks:
      - roggo_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - dev_db:/data/db
      - dev_configdb:/data/configdb
    logging:
      options:
        max-size: 1g
    environment:
      - MONGO_INITDB_ROOT_USERNAME=BallchasingWrapper
      - MONGO_INITDB_ROOT_PASSWORD=chaser
  
  ballchasing_wrapper:
    image: ballchasing-wrapper:dev
    ports:
      - '9000:9000'
    container_name: ballchasing_wrapper
    networks:
      - roggo_network
    depends_on:
      ballchasing_db:
        condition: service_healthy
    environment:
      - BALLCHASING_API_KEY=${BALLCHASING_API_KEY}
      - MONGO_HOST=ballchasing_db
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}