volumes:
  mongo_data_volume:
networks:
  roggo_network:
services:
  ballchasing_db:
    image: mongo:8.0.10
    # ports:
    #   - '29017:27017'
    container_name: ballchasing_db
    networks:
      - roggo_network
    volumes:
      - mongo_data_volume:/data/db
    logging:
      options:
        max-size: 1g
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
  
  ballchasing_wrapper:
    image: ballchasing-wrapper:dev
    # ports:
    #   - '9000:9000'
    container_name: ballchasing_wrapper
    networks:
      - roggo_network
    depends_on:
      ballchasing_db:
        condition: service_started
    environment:
      - BALLCHASING_API_KEY=${BALLCHASING_API_KEY}
      - MONGO_HOST=ballchasing_db
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}

  roggo_discord_bot:
    image: roggo-discord-bot:dev
    container_name: 'roggo_discord_bot'
    networks:
      - roggo_network
    depends_on:
      ballchasing_db:
        condition: service_started
      ballchasing_wrapper:
        condition: service_started
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - BALLCHASING_HOST=ballchasing_wrapper
      - BALLCHASING_PORT=9000
